<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFM Customer Segmentation Dashboard</title>
    <style>
        /* Reset y tipografía base */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #F4F6F8; /* Gris perlado para descansar la vista */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor principal estilo "tarjeta" */
        .dashboard-container {
            background-color: #FFFFFF;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); /* Sombra suave */
            padding: 32px;
            width: 95%;
            max-width: 1200px; /* Ancho máximo para pantallas grandes */
            box-sizing: border-box;
            margin: 40px 0;
        }

        /* Encabezado minimalista */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            color: #333333;
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* Contenedor responsivo para el iframe (Mantiene proporción 16:9) */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Relación de aspecto 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            border: 1px solid #EAEAEA;
            background-color: #FAFAFA; /* Color de carga temporal */
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>Customer Segmentation using K-Means Clustering</h1>
        </div>
        
        <div class="iframe-wrapper">
            <iframe 
                title="RFM_dashboard" 
                src="https://app.powerbi.com/view?r=eyJrIjoiYzMyYjAyMjctM2Q4ZC00OGFmLWE0OTEtY2ZjNTdhYjMwODYyIiwidCI6IjQ2MmMwMmM1LTQ2NTUtNDJlZC1hNGRjLWVmNGU1MTdiNjQ1NCIsImMiOjR9&pageName=5b03e068a86cb0289980" 
                allowFullScreen="true">
            </iframe>
        </div>
    </div>

</body>
</html>
